<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f172a" />

    <!-- Primary SEO is managed dynamically in React components via react-helmet-async -->
    <meta name="author" content="PDFMarkr" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />

    <link rel="apple-touch-icon" href="/app-icon.png" />

    <meta name="twitter:title" content="PDFMarkr — Free Online PDF Tools" />
    <meta name="twitter:description" content="Merge, split, compress, rotate and convert PDFs instantly in your browser. 100% secure — files never leave your device." />
    <meta name="twitter:image" content="https://pdfmarkr.com/og-image.png" />

    <!-- Theme / PWA -->
    <meta name="theme-color" content="#3b82f6" />
    <meta name="application-name" content="PDFMarkr" />

    <!-- JSON-LD: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "PDFMarkr",
      "url": "https://pdfmarkr.com",
      "description": "Free, private, browser-based PDF tools. Merge PDF, split pages, compress PDF size, rotate, and convert PDF to Word without uploading files.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": { "@type": "EntryPoint", "urlTemplate": "https://pdfmarkr.com/?q={search_term_string}" },
        "query-input": "required name=search_term_string"
      },
      "publisher": {
        "@type": "Organization",
        "name": "PDFMarkr",
        "url": "https://pdfmarkr.com",
        "logo": {
          "@type": "ImageObject",
          "url": "https://pdfmarkr.com/logo.png"
        }
      }
    }
    </script>

    <!-- JSON-LD: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "PDFMarkr",
      "applicationCategory": "UtilitiesApplication",
      "operatingSystem": "Web Browser",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "aggregateRating": { "@type": "AggregateRating", "ratingValue": "4.9", "reviewCount": "2847" }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
