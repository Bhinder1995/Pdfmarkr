<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f172a" />

    <!-- Primary SEO -->
    <title>Online PDF Tools — No Upload, No Sign-Up | PDFMarkr</title>
    <meta name="description" content="Merge, split, compress, rotate, and convert PDFs entirely in your browser. No account, no server uploads, no waiting. Professional PDF tools, free forever." />
    <meta name="keywords" content="online PDF tools no upload, browser-based PDF tools, PDF merge split compress, no sign-up PDF tool, free PDF tools any device" />
    <meta name="author" content="PDFMarkr" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://pdfmarkr.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="PDFMarkr" />
    <meta property="og:title" content="PDFMarkr — 100% Free Online PDF Tools | Maximum Privacy" />
    <meta property="og:description" content="8 professional PDF utilities running entirely in your browser. Merge, compress, and convert PDFs instantly. Zero uploads. No servers." />
    <meta property="og:url" content="https://pdfmarkr.com/" />
    <meta property="og:image" content="https://pdfmarkr.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PDFMarkr — Free Online PDF Tools" />
    <meta name="twitter:description" content="Merge, split, compress, rotate and convert PDFs instantly in your browser. 100% secure — files never leave your device." />
    <meta name="twitter:image" content="https://pdfmarkr.com/og-image.png" />

    <!-- Theme / PWA -->
    <meta name="theme-color" content="#3b82f6" />
    <meta name="application-name" content="PDFMarkr" />

    <!-- JSON-LD: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "PDFMarkr",
      "url": "https://pdfmarkr.com",
      "description": "Free, private, browser-based PDF tools. Merge PDF, split pages, compress PDF size, rotate, and convert PDF to Word without uploading files.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": { "@type": "EntryPoint", "urlTemplate": "https://pdfmarkr.com/?q={search_term_string}" },
        "query-input": "required name=search_term_string"
      },
      "publisher": {
        "@type": "Organization",
        "name": "PDFMarkr",
        "url": "https://pdfmarkr.com",
        "logo": {
          "@type": "ImageObject",
          "url": "https://pdfmarkr.com/logo.png"
        }
      }
    }
    </script>

    <!-- JSON-LD: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "PDFMarkr",
      "applicationCategory": "UtilitiesApplication",
      "operatingSystem": "Web Browser",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "aggregateRating": { "@type": "AggregateRating", "ratingValue": "4.9", "reviewCount": "2847" }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
